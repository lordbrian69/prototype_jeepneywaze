version: "3.9"

services:
  # ─── PostgreSQL + PostGIS ─────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: jw_postgres
    environment:
      POSTGRES_DB: jeepneywaze
      POSTGRES_USER: jeepney
      POSTGRES_PASSWORD: jeepney_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeepney -d jeepneywaze"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jw_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Eclipse Mosquitto (MQTT broker) ──────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: jw_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"   # WebSocket
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  # ─── Zookeeper (for Kafka) ────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: jw_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  # ─── Kafka ────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: jw_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── API Service ──────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: jw_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: jeepneywaze
      POSTGRES_USER: jeepney
      POSTGRES_PASSWORD: jeepney_dev_pass
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      BEACON_ENGINE_URL: http://beacon-engine:8001
    volumes:
      - ./services/api/src:/app/src  # Hot-reload in dev
    env_file:
      - .env

  # ─── GPS Ingestion (Go) ───────────────────────────────
  gps-ingestion:
    build:
      context: ./services/gps-ingestion
      dockerfile: Dockerfile
    container_name: jw_gps
    depends_on:
      - mosquitto
      - kafka
    ports:
      - "8080:8080"
    environment:
      MQTT_BROKER_URL: tcp://mosquitto:1883
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_GPS_PINGS: gps.pings
    env_file:
      - .env

  # ─── Beacon Engine (Python) ───────────────────────────
  beacon-engine:
    build:
      context: ./services/beacon-engine
      dockerfile: Dockerfile
    container_name: jw_beacon
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: jeepneywaze
      POSTGRES_USER: jeepney
      POSTGRES_PASSWORD: jeepney_dev_pass
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    env_file:
      - .env

  # ─── NGINX reverse proxy ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: jw_nginx
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  zookeeper_data:
  kafka_data:
