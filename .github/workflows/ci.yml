name: JeepneyWaze CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── API (Node.js) ──────────────────────────────────────
  api:
    name: API — Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/api/package.json
      - run: npm install
      - run: npm run build

  # ── Beacon Engine (Python) ────────────────────────────
  beacon-engine:
    name: Beacon Engine — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/beacon-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m py_compile main.py app/clustering/dbscan.py app/clustering/kalman.py app/clustering/stop_pattern.py

  # ── GPS Ingestion (Go) ────────────────────────────────
  gps-ingestion:
    name: GPS Ingestion — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gps-ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - run: go build ./...

  # ── Flutter (Commuter App) ────────────────────────────
  commuter-app:
    name: Commuter App — Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/commuter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.x"
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
