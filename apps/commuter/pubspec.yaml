name: jeepneywaze_commuter
description: JeepneyWaze — Real-time jeepney tracking for commuters
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.1

  # Maps (MapLibre/OpenStreetMap)
  flutter_map: ^6.1.0
  flutter_map_cancellable_tile_provider: ^2.0.0
  latlong2: ^0.9.1

  # Real-time (Socket.io)
  socket_io_client: ^2.0.3+1

  # MQTT (GPS broadcasting — commuter-as-sensor)
  mqtt_client: ^10.3.0

  # GPS / Location
  geolocator: ^12.0.0
  sensors_plus: ^5.0.1      # accelerometer for motion detection

  # Offline storage (WatermelonDB-style local SQLite)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Connectivity (offline banner)
  connectivity_plus: ^6.0.3

  # HTTP
  dio: ^5.4.3+1

  # Auth (Supabase)
  supabase_flutter: ^2.5.0

  # Push notifications
  firebase_core: ^2.30.1
  firebase_messaging: ^14.9.1

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  intl: 0.20.2
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/map/            # Offline MapLibre style JSON
  # fonts:
  #   - family: JeepneyWaze
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
