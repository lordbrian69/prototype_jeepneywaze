events { worker_connections 1024; }

http {
  upstream api {
    server api:3000;
  }

  upstream beacon_engine {
    server beacon-engine:8001;
  }

  server {
    listen 80;
    server_name localhost;

    # API + Socket.io
    location /api/ {
      proxy_pass http://api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket (Socket.io)
    location /socket.io/ {
      proxy_pass http://api/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    # Beacon engine internal only (not exposed externally in prod)
    location /beacon/ {
      allow 172.0.0.0/8;  # Docker internal only
      deny all;
      proxy_pass http://beacon_engine/;
    }
  }
}
